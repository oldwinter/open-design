name: github-metrics

on:
  schedule:
    # Runs daily at 00:15 UTC; output is committed to docs/assets/github-metrics.svg.
    - cron: '15 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/metrics.yml

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  metrics:
    name: Generate repository metrics SVG
    if: github.repository == 'nexu-io/open-design'
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub repository metrics
        uses: lowlighter/metrics@latest
        with:
          # Output path; the action opens/updates a PR when this file changes.
          # Requires manual review to merge. If metrics unchanged, no PR is created.
          filename: docs/assets/github-metrics.svg

          # Auth: METRICS_TOKEN must be a fine-grained PAT or GitHub App token that
          # can create pull requests in this repository. GITHUB_TOKEN is kept only
          # as a read/render fallback because many orgs disallow PR creation from it.
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          committer_token: ${{ secrets.METRICS_TOKEN }}
          committer_message: Update ${filename}
          output_action: pull-request
          output_condition: data-changed

          # Use the repository template (per-repo metrics, not user metrics).
          # Organization-owned repositories must be targeted explicitly, otherwise
          # lowlighter/metrics infers the token owner and treats the target as an org.
          template: repository
          base: ''
          user: nexu-io
          repo: open-design

          # Plugins. Anything that requires a personal token will silently no-op
          # without METRICS_TOKEN — the rest still produce a useful SVG.
          plugin_contributors: yes
          plugin_contributors_categories: |
            {
              "Skills": "skills/**",
              "Design systems": "design-systems/**",
              "Web": "apps/web/**",
              "Daemon": "apps/daemon/**",
              "Docs": "docs/**"
            }
          plugin_followup: yes
          plugin_followup_sections: pr, issue
          plugin_languages: yes
          plugin_languages_details: lines, percentage
          plugin_languages_limit: 8
          plugin_lines: yes
          plugin_traffic: yes
          plugin_stargazers: yes
          plugin_stargazers_charts_type: chartist

          config_timezone: Asia/Shanghai
          config_display: large

      - name: Trigger CI for metrics PR branch
        env:
          GH_TOKEN: ${{ github.token }}
          METRICS_PR_TITLE: Auto-generated metrics for run #${{ github.run_id }}
        run: |
          set -euo pipefail
          METRICS_PR_NUMBER=''
          SEARCH_QUERY="repo:${{ github.repository }} is:pr is:open in:title \"$METRICS_PR_TITLE\""

          for attempt in 1 2 3 4 5; do
            METRICS_PR_NUMBER="$(gh api search/issues \
              -f q="$SEARCH_QUERY" \
              --jq '.items[0].number // empty')"

            if [ -n "$METRICS_PR_NUMBER" ]; then
              break
            fi

            sleep 5
          done

          if [ -z "$METRICS_PR_NUMBER" ]; then
            echo "Expected metrics PR titled '$METRICS_PR_TITLE' but none was found" >&2
            exit 1
          fi

          METRICS_PR_VIEW="$(gh pr view "$METRICS_PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json title,baseRefName,headRefName \
            --template '{{printf "%s\t%s\t%s" .title .baseRefName .headRefName}}')"

          IFS=$'\t' read -r METRICS_PR_FOUND_TITLE METRICS_PR_BASE METRICS_BRANCH <<< "$METRICS_PR_VIEW"

          if [ "$METRICS_PR_FOUND_TITLE" != "$METRICS_PR_TITLE" ] || [ "$METRICS_PR_BASE" != 'main' ] || [ -z "$METRICS_BRANCH" ]; then
            echo "Metrics PR #$METRICS_PR_NUMBER did not target main or had an unexpected title" >&2
            exit 1
          fi

          gh workflow run ci.yml --repo "${{ github.repository }}" --ref "$METRICS_BRANCH"
